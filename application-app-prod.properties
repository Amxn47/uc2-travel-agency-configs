# application-app-prod.properties

# Datasource URL
spring.datasource.url=jdbc:mysql://localhost:3306/productproddb
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA overrides for prod (strict — no auto schema changes)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Eureka
eureka.client.fetch-registry=true

# Logging
logging.level.root=WARN
logging.level.com.travelagency=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# Swagger 
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Actuator 
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# SSL 
server.ssl.enabled=true
server.ssl.key-store=${SSL_KEYSTORE_PATH}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
server.ssl.key-store-type=PKCS12

# Audit
audit.service.enabled=true
audit.service.url=http://audit-service/api/audit

# Vault path for prod DB secrets
spring.cloud.vault.kv.default-context=travel-agency/prod/db
