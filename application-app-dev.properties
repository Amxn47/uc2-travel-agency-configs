# application-app-dev.properties

# Datasource URL (dev database)
spring.datasource.url=jdbc:mysql://localhost:3306/productdevdb
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA overrides for dev (more permissive)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Eureka
eureka.client.fetch-registry=true

# Logging
logging.level.root=INFO
logging.level.com.travelagency=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Swagger
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Audit
audit.service.enabled=true
audit.service.url=http://audit-service/api/audit

# Vault path for dev DB secrets
spring.cloud.vault.kv.default-context=travel-agency/dev/db
