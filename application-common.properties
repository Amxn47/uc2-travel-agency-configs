spring.datasource.username=${mysqlusername}
spring.datasource.password=${mysqlpassword}

spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=12
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
#spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
# JPA (JpaBaseConfiguration, HibernateJpaAutoConfiguration)
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database=default
spring.jpa.show-sql=true
spring.datasource.generate-unique-name=false
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

#actuator properties
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# === Resource server JWT validation ===
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/master

# === Used by OpenAPI config below ===
keycloak.issuer=http://localhost:8080/realms/master
# Keycloak Realm
keycloak.realm= master
#springdoc.swagger-ui.oauth.client-id=swagger-ui
springdoc.swagger-ui.oauth.use-pkce-with-authorization-code-grant=true
#springdoc.swagger-ui.disable-swagger-default-url=true
#springdoc.api-docs.path=/v3/api-docs
#springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config

#eureka client properties
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=localhost
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=false
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}

# Audit Service Url
auditserviceUrl=http://localhost:8808/audits/v1.0


# Circuit Breaker {Resilience4j}
# Retry (runs first — order 2)
resilience4j.retry.retry-aspect-order=2
resilience4j.retry.instances.bookingRetry.max-attempts=3
resilience4j.retry.instances.bookingRetry.wait-duration=10s
resilience4j.retry.instances.bookingRetry.enable-exponential-backoff=true
resilience4j.retry.instances.bookingRetry.exponential-backoff-multiplier=2
resilience4j.retry.instances.bookingRetry.retry-exceptions=org.springframework.web.client.RestClientException

resilience4j.retry.instances.paymentRetry.max-attempts=3
resilience4j.retry.instances.paymentRetry.wait-duration=10s
resilience4j.retry.instances.paymentRetry.enable-exponential-backoff=true
resilience4j.retry.instances.paymentRetry.exponential-backoff-multiplier=2
resilience4j.retry.instances.paymentRetry.retry-exceptions=org.springframework.web.client.RestClientException

# Circuit Breaker (runs second — order 1)
resilience4j.circuitbreaker.circuit-breaker-aspect-order=1
resilience4j.circuitbreaker.instances.bookingCircuitBreaker.wait-duration-in-open-state=1m
resilience4j.circuitbreaker.instances.bookingCircuitBreaker.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.bookingCircuitBreaker.sliding-window-type=count-based
resilience4j.circuitbreaker.instances.bookingCircuitBreaker.sliding-window-size=3
resilience4j.circuitbreaker.instances.bookingCircuitBreaker.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.bookingCircuitBreaker.slow-call-duration-threshold=10s
resilience4j.circuitbreaker.instances.bookingCircuitBreaker.slow-call-rate-threshold=60
resilience4j.circuitbreaker.instances.bookingCircuitBreaker.failure-rate-threshold=60

resilience4j.circuitbreaker.instances.paymentCircuitBreaker.wait-duration-in-open-state=1m
resilience4j.circuitbreaker.instances.paymentCircuitBreaker.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.paymentCircuitBreaker.sliding-window-type=count-based
resilience4j.circuitbreaker.instances.paymentCircuitBreaker.sliding-window-size=3
resilience4j.circuitbreaker.instances.paymentCircuitBreaker.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.paymentCircuitBreaker.slow-call-duration-threshold=10s
resilience4j.circuitbreaker.instances.paymentCircuitBreaker.slow-call-rate-threshold=60
resilience4j.circuitbreaker.instances.paymentCircuitBreaker.failure-rate-threshold=60

# Rate Limiter (runs third — order 3)
resilience4j.ratelimiter.ratelimiter-aspect-order=3
resilience4j.ratelimiter.instances.bookingRateLimiter.limit-for-period=5
resilience4j.ratelimiter.instances.bookingRateLimiter.limit-refresh-period=2m
resilience4j.ratelimiter.instances.bookingRateLimiter.timeout-duration=500ms

resilience4j.ratelimiter.instances.paymentRateLimiter.limit-for-period=5
resilience4j.ratelimiter.instances.paymentRateLimiter.limit-refresh-period=2m
resilience4j.ratelimiter.instances.paymentRateLimiter.timeout-duration=500ms
